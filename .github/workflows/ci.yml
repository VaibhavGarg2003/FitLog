# ════════════════════════════════════════════════════════════════
# FitLog — CI/CD Pipeline (GitHub Actions)
# ════════════════════════════════════════════════════════════════
#
# WHAT IS CI/CD?
# ─────────────
# CI (Continuous Integration): Automatically run checks (tests, lint,
#   type-check) every time code is pushed. Catches bugs BEFORE they
#   reach production.
#
# CD (Continuous Deployment): Automatically deploy to production when
#   checks pass. Vercel handles CD — it deploys on every merge to main.
#   This file handles CI only.
#
# WHEN DOES THIS RUN?
# ──────────────────
# - On every push to `main` branch
# - On every Pull Request targeting `main`
#
# WHAT DOES IT CHECK?
# ──────────────────
# 1. TypeScript type-check (catches type errors)
# 2. ESLint (catches code quality issues)
# 3. Prisma validation (catches schema errors)
# 4. Build (catches import errors, missing files)
#
# If ANY step fails, the PR shows a red ❌ and can't be merged.
# ════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# `concurrency` cancels previous runs of the same workflow if a new
# push comes in. Saves CI minutes (don't run checks on outdated code).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    # ubuntu-latest = a fresh Linux VM. GitHub provides this for free.

    # Throwaway Postgres for the migration-drift check (step 8).
    # `prisma migrate diff --from-migrations` replays every migration into a
    # shadow database to compute what schema they produce — it needs a real
    # (empty, disposable) Postgres to do that. This container dies with the job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your repo into the VM.

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          # cache: "npm" → caches node_modules between runs.
          # Without this, npm install takes ~30s every run.
          # With cache, it takes ~3s. Saves CI minutes.

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
        # `npm ci` (not `npm install`) is for CI environments.
        # Differences:
        # - Deletes node_modules first (clean install)
        # - Installs EXACT versions from package-lock.json
        # - Fails if package-lock.json is out of sync
        # - Faster than npm install

      # Step 4: Generate Prisma client (needed for type-check)
      - name: Generate Prisma client
        run: npx prisma generate
        # Prisma generates TypeScript types from schema.prisma.
        # Without this, `tsc` would fail because it can't find
        # types like `User`, `WorkoutSession`, etc.

      # Step 5: TypeScript type-check
      - name: Type check
        run: npx tsc --noEmit
        # --noEmit → only CHECK types, don't output JavaScript files.
        # This is a compile-time check, not a build.

      # Step 6: ESLint
      - name: Lint
        run: npm run lint

      # Step 7: Unit tests (engine formulas + validation schemas)
      - name: Test
        run: npm test
        # Vitest. The engine is pure math — the highest-risk, cheapest-to-test
        # code in the app. A broken formula turns CI red BEFORE it can ship
        # wrong calorie targets to users.

      # Step 8: Prisma schema validation
      - name: Validate Prisma schema
        run: npx prisma validate
        # Checks schema.prisma for syntax errors, invalid relations,
        # missing fields, etc. Catches DB schema bugs early.

      # Step 9: Migration drift check
      - name: Migration drift check
        run: >
          npx prisma migrate diff
          --from-migrations prisma/migrations
          --to-schema prisma/schema.prisma
          --exit-code
        env:
          # Prisma 7 removed the --shadow-database-url CLI flag; the shadow
          # DB now comes from prisma.config.ts (datasource.shadowDatabaseUrl),
          # which reads SHADOW_DATABASE_URL. Point it at the throwaway
          # service container — Prisma replays all migrations there and
          # wipes it. Kept distinct from DATABASE_URL/DIRECT_URL (Prisma
          # requires the shadow DB to be a different database).
          SHADOW_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/shadow"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
        # Replays all migrations into the throwaway Postgres and diffs the
        # result against schema.prisma. Exit code 2 (= they disagree) fails CI.
        # This catches the classic mistake: editing schema.prisma and pushing
        # WITHOUT creating a migration — schema and database silently diverge.

      # Step 10: Next.js build (the most thorough check)
      - name: Build
        run: npm run build
        env:
          # ── Supabase (public vars needed for client-side compilation) ──
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
          # ── Database (needed by prisma.config.ts for prisma generate) ──
          # These are FAKE — CI never actually connects to the database.
          # prisma generate just reads schema.prisma for type generation;
          # it doesn't make a DB connection. But prisma.config.ts requires
          # the URL to be defined (non-undefined) to pass validation.
          DATABASE_URL: "postgresql://postgres:placeholder@placeholder.supabase.com:6543/postgres"
          DIRECT_URL: "postgresql://postgres:placeholder@placeholder.supabase.com:5432/postgres"
          # ── AI keys (needed for import resolution, never called) ──
          GEMINI_API_KEY: "placeholder"
          GROQ_API_KEY: "placeholder"
          OPENROUTER_API_KEY: "placeholder"
          # ── Redis (needed for import resolution, never called) ──
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          # ── Misc ──
          CRON_SECRET: "placeholder"
          SENTRY_DSN: ""
